name: Skhodka
options:
  bundleIdPrefix: com.skhodka
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
targets:
  Skhodka:
    type: application
    platform: iOS
    sources:
      - Skhodka
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skhodka.app
        INFOPLIST_FILE: Skhodka/Info.plist
        CODE_SIGN_ENTITLEMENTS: Skhodka/Skhodka.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
