<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сходка — правовые документы</title>
<style>
  :root{
    --paper:#faf7ed; --surface:#ffffff; --ink:#1c1a15; --ink2:#6f6a5f;
    --line:#e6e1d4; --accent:#ff4f2e;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px}
  .box{max-width:560px; width:100%}
  .eyebrow{font-size:12px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin:0 0 12px}
  h1{font-family:Georgia,"Times New Roman",serif; font-size:clamp(32px,7vw,52px); line-height:1.05; margin:0 0 10px; letter-spacing:-.5px}
  p.lead{color:var(--ink2); margin:0 0 28px}
  a.doc{display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:12px}
  a.doc:hover{border-color:var(--accent)}
  a.doc .ico{width:40px; height:40px; flex:none; border-radius:12px; background:#ff4f2e1f; color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:20px}
  a.doc .t{font-weight:600}
  a.doc .d{font-size:13px; color:var(--ink2)}
  a.doc .arrow{margin-left:auto; color:var(--ink2)}
  footer{color:var(--ink2); font-size:13px; margin-top:22px}
</style>
</head>
<body>
  <div class="box">
    <p class="eyebrow">Сходка</p>
    <h1>Правовые документы</h1>
    <p class="lead">Найди компанию под любое занятие поблизости. Ниже — как мы работаем с данными и правила сообщества.</p>

    <a class="doc" href="privacy.html">
      <span class="ico">🔒</span>
      <span><span class="t">Политика конфиденциальности</span><br><span class="d">Какие данные собираем и как ими управлять</span></span>
      <span class="arrow">→</span>
    </a>
    <a class="doc" href="terms.html">
      <span class="ico">📋</span>
      <span><span class="t">Правила сообщества</span><br><span class="d">Как вести себя и что запрещено</span></span>
      <span class="arrow">→</span>
    </a>

    <footer>© 2026 Сходка</footer>
  </div>
</body>
</html>
